<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng kí Hội thao</title>
</head>
<body>

    <h2>Đăng kí tham gia Hội thao</h2>

    <form>

        <!-- Họ tên -->
        <p>
            Họ và tên:
            <input type="text" name="hoten">
        </p>

        <!-- Email -->
        <p>
            Địa chỉ email:
            <input type="email" name="email">
        </p>

        <!-- Lớp -->
        <p>
            <input type="radio" name="lop" value="10"> Lớp 10
            <input type="radio" name="lop" value="11"> Lớp 11
            <input type="radio" name="lop" value="12"> Lớp 12
        </p>

        <!-- Môn -->
        <p>Tham dự môn:</p>

        <p>
            <input type="checkbox" name="mon" value="Bóng bàn"> Bóng bàn<br>
            <input type="checkbox" name="mon" value="Cầu lông"> Cầu lông<br>
            <input type="checkbox" name="mon" value="Cờ vua"> Cờ vua
        </p>

        <!-- Nút -->
        <p>
            <input type="submit" value="Đăng kí">
            <input type="reset" value="Hủy bỏ">
        </p>

    </form>

</body>
</html>
